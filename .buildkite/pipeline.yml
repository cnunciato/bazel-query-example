steps:
  # Build all targets in parallel
  - group: "Build"
    steps:
      - label: ":package: Build auth service"
        command: "bazel build //services/auth:auth"

      - label: ":package: Build payment service"
        command: "bazel build //services/payment:payment"

      - label: ":package: Build user service"
        command: "bazel build //services/user:user"

      - label: ":package: Build libraries"
        command: "bazel build //lib/..."

  # Test all targets in parallel
  - group: "Test"
    steps:
      - label: ":test_tube: Test config library"
        command: "bazel test //lib/config:config_test --test_output=all"

      - label: ":test_tube: Test logging library"
        command: "bazel test //lib/logging:logging_test --test_output=all"

      - label: ":test_tube: Test metrics library"
        command: "bazel test //lib/metrics:metrics_test --test_output=all"

      - label: ":test_tube: Test auth service"
        command: "bazel test //services/auth:auth_test --test_output=all"

      - label: ":test_tube: Test payment service"
        command: "bazel test //services/payment:payment_test --test_output=all"

      - label: ":test_tube: Test user service"
        command: "bazel test //services/user:user_test --test_output=all"

  # Generate build summary annotation
  - wait: ~

  - label: ":chart_with_upwards_trend: Generate build summary"
    command: |
      # Count successful build and test targets
      BUILD_TARGETS=4
      TEST_TARGETS=6
      TOTAL_TARGETS=10

      # Create annotation with build stats
      cat << EOF | buildkite-agent annotate --style=success --context=build-summary
      ## :white_check_mark: Build Summary

      **Targets processed:** $TOTAL_TARGETS
      **Build targets:** $BUILD_TARGETS
      **Test targets:** $TEST_TARGETS

      ### Services Built
      - :package: Auth service
      - :package: Payment service
      - :package: User service

      ### Libraries Built
      - :books: Config library
      - :books: Logging library
      - :books: Metrics library
      - :books: Tracing library

      ### Tests Executed
      - :test_tube: Config library tests
      - :test_tube: Logging library tests
      - :test_tube: Metrics library tests
      - :test_tube: Auth service tests
      - :test_tube: Payment service tests
      - :test_tube: User service tests

      All targets built and tested successfully! :rocket:
      EOF